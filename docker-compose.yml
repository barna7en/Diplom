services:
  db:
    image: postgres:16-alpine
    container_name: spd-diplom-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dj_diplom}
      POSTGRES_USER: ${POSTGRES_USER:-adilet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1}
    # Use a high host port to avoid clashes with local PostgreSQL or other agents on 5432/5433.
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adilet -d dj_diplom"]
      interval: 3s
      timeout: 5s
      retries: 10
